services:
  postgres:
    image: postgres:16-alpine
    container_name: project1-postgres
    environment:
      POSTGRES_DB: gymfixer
      POSTGRES_USER: gymfixer
      POSTGRES_PASSWORD: gymfixer_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - project1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymfixer -d gymfixer"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: aduy2408/gymfixer-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project1-backend
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - project1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  project1-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  postgres-data:
    driver: local
