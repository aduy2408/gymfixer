version: '3.8'

services:
  # Backend service
  backend:
    image: aduy2408/gymfixer-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project1-backend
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    volumes:
      - backend-data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - project1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  project1-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
