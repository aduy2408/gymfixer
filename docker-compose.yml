
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.cpu
    image: gymfixer-backend:local
    container_name: gymfixer-backend
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    environment:
      ENVIRONMENT: production
      POSE_BACKEND: mediapipe
      MP_MODEL_COMPLEXITY: "0"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend-data:
